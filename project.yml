name: Inyon
options:
  bundleIdPrefix: com.inyon
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    version: 11.0.0
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: 8.0.0

targets:
  Inyon:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.md"
          - "*.yml"
          - ".git/**"
          - "Tests/**"
          - "UITests/**"
          - "functions/**"
          - "scripts/**"
          - ".githooks/**"
          - ".claude/**"
          - ".firebaserc"
          - "firebase.json"
          - "firestore.rules"
          - "Inyon.xcodeproj"
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseFunctions
      - package: Firebase
        product: FirebaseAnalytics
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    info:
      path: Inyon/Info.plist
      properties:
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchScreen: {}
        UISupportedInterfaceOrientations~iphone:
          - UIInterfaceOrientationPortrait
        CFBundleURLTypes:
          - CFBundleTypeRole: None
            CFBundleURLSchemes:
              - $(REVERSED_CLIENT_ID)
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.inyon.app
      CODE_SIGN_ENTITLEMENTS: Inyon.entitlements
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      SWIFT_EMIT_LOC_STRINGS: YES
      REVERSED_CLIENT_ID: com.googleusercontent.apps.1013956847577-1480bpsi90bhdfm7air3in968l6duj35
      DEVELOPMENT_TEAM: P36FA794LZ

  InyonTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: Inyon
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.inyon.app.tests
      GENERATE_INFOPLIST_FILE: YES
